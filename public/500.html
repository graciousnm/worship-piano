<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Server Error | Worship Piano</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="/tailwind.css" rel="stylesheet" />
  <style>
    body {
      background: #09090b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-glow {
      animation: pulseGlow 3s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }
  </style>
</head>
<body class="font-sans antialiased">
  <div class="text-center px-6 max-w-lg">
    <div class="error-glow mb-6">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-20 h-20 sm:w-24 sm:h-24 mx-auto" style="filter: drop-shadow(0 0 30px rgba(239,68,68,0.15)); color: rgba(239,68,68,0.4);"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 20V10"/><path d="M10 20V10"/><path d="M14 20V4"/><path d="M18 20V10"/></svg>
    </div>
    <h1 class="text-6xl sm:text-7xl font-black text-zinc-800 mb-4">500</h1>
    <p class="text-xl sm:text-2xl font-semibold text-zinc-400 mb-2">Something went wrong</p>
    <p class="text-sm sm:text-base text-zinc-600 mb-8 max-w-sm mx-auto">
      We hit a wrong note. The server encountered an internal error. Please try again shortly.
    </p>
    <a href="/"
      class="inline-flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-sm bg-brand text-zinc-900 hover:bg-brand-light transition shadow-lg shadow-brand/20 hover:shadow-brand/30 active:scale-95 no-underline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1.25rem;height:1.25rem"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Back to the music
    </a>
  </div>
</body>
</html>
